services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: hub
    volumes:
      - hedhog-postgresql-hub:/var/lib/postgresql
    ports:
      - 5444:5432
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U hub
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - 6379:6379
    volumes:
      - hedhog-redis-hub:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
  mailhog:
    image: mailhog/mailhog:latest
    restart: always
    ports:
      - 1025:1025
      - 8025:8025
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: start --all --config /etc/ngrok/ngrok.yml --log=stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - 4040:4040
    volumes:
      - ./ngrok.yml:/etc/ngrok/ngrok.yml:ro
    extra_hosts:
      - host.docker.internal:host-gateway
volumes:
  hedhog-postgresql-hub: {}
  hedhog-redis-hub: {}
